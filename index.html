<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GHOSTZIN'ZK</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e0000a;
    --red-glow: #ff0015;
    --dark: #0a0000;
    --card-bg: rgba(18, 2, 2, 0.82);
    --item-bg: rgba(80, 10, 10, 0.55);
    --item-border: rgba(200, 20, 20, 0.35);
    --text: #fff;
    --sub: rgba(255,200,200,0.7);
  }

  html, body {
    min-height: 100%;
    height: 100%;
  }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Background */
  .bg {
    position: fixed;
    inset: 0;
    background-image: url('https://i.ibb.co/F4kZY1x4/1003900249.jpg');
    background-size: cover;
    background-position: center;
    filter: blur(6px) brightness(0.35) saturate(1.4);
    transform: scale(1.08);
    z-index: 0;
  }

  /* Red corner brackets overlay */
  .corners {
    position: fixed;
    inset: 12px;
    z-index: 1;
    pointer-events: none;
  }
  .corners::before, .corners::after,
  .corners span::before, .corners span::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--red);
    border-style: solid;
  }
  .corners::before { top:0; left:0; border-width: 3px 0 0 3px; }
  .corners::after  { top:0; right:0; border-width: 3px 3px 0 0; }
  .corners span::before { bottom:0; left:0; border-width: 0 0 3px 3px; }
  .corners span::after  { bottom:0; right:0; border-width: 0 3px 3px 0; }

  /* Card */
  .card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 390px;
    margin: 0 auto;
    padding: 36px 22px 32px;
    background: var(--card-bg);
    border: 1px solid rgba(220,20,20,0.3);
    border-radius: 18px;
    box-shadow:
      0 0 40px rgba(220,0,10,0.25),
      0 0 80px rgba(220,0,10,0.12),
      inset 0 0 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Profile avatar */
  .avatar-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }

  .avatar-ring {
    width: 110px; height: 110px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(var(--red-glow), #6b0000, var(--red-glow));
    box-shadow: 0 0 22px rgba(255,0,20,0.7), 0 0 50px rgba(200,0,20,0.35);
    animation: spin 6s linear infinite;
  }

  @keyframes spin {
    from { filter: hue-rotate(0deg) drop-shadow(0 0 8px #f00); }
    50%  { filter: hue-rotate(20deg) drop-shadow(0 0 18px #ff2200); }
    to   { filter: hue-rotate(0deg) drop-shadow(0 0 8px #f00); }
  }

  .avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid #1a0000;
  }

  .avatar-inner img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  /* Name */
  .name {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.1rem;
    letter-spacing: 0.22em;
    color: #fff;
    text-shadow: 0 0 12px rgba(255,30,30,0.8), 0 0 30px rgba(200,0,0,0.4);
    margin-bottom: 28px;
    user-select: none;
  }

  .name span {
    color: var(--red-glow);
    text-shadow: 0 0 16px var(--red-glow), 0 0 40px rgba(255,0,20,0.5);
  }

  /* Accordion items */
  .accordion {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .acc-item {
    border-radius: 12px;
    border: 1px solid var(--item-border);
    background: var(--item-bg);
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .acc-item.open {
    border-color: rgba(255, 30, 30, 0.6);
    box-shadow: 0 0 16px rgba(200,0,10,0.25);
  }

  .acc-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s;
  }

  .acc-header:active {
    background: rgba(200, 0, 10, 0.15);
  }

  .acc-icon {
    width: 38px; height: 38px;
    background: rgba(180, 10, 10, 0.45);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1.1rem;
    border: 1px solid rgba(255,50,50,0.3);
  }

  .acc-label {
    flex: 1;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 0.12em;
    color: var(--text);
  }

  .acc-arrow {
    font-size: 0.75rem;
    color: var(--red);
    transition: transform 0.3s ease;
  }

  .acc-item.open .acc-arrow {
    transform: rotate(90deg);
  }

  /* Content panel */
  .acc-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .acc-item.open .acc-body {
    max-height: 600px;
  }

  .acc-content {
    padding: 6px 18px 18px 18px;
    border-top: 1px solid rgba(200,20,20,0.2);
  }

  /* Number link */
  .number-link {
    display: block;
    text-align: center;
    padding: 13px 20px;
    margin-top: 8px;
    background: rgba(200,0,10,0.18);
    border: 1px solid rgba(255,30,30,0.35);
    border-radius: 10px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    text-decoration: none;
    transition: background 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .number-link:active {
    background: rgba(200,0,10,0.4);
    box-shadow: 0 0 18px rgba(255,0,20,0.35);
  }
  .number-label {
    display: block;
    font-size: 0.75rem;
    color: var(--sub);
    letter-spacing: 0.08em;
    margin-bottom: 2px;
    font-weight: 400;
  }

  /* Artist name */
  .artist-name {
    text-align: center;
    padding: 12px;
    margin-top: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.1em;
    color: #fff;
    text-shadow: 0 0 10px rgba(255,80,80,0.5);
    background: rgba(200,0,10,0.12);
    border: 1px solid rgba(255,30,30,0.2);
    border-radius: 10px;
  }

  /* Anime list */
  .anime-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-top: 8px;
  }

  .anime-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(150,5,5,0.2);
    border: 1px solid rgba(255,30,30,0.18);
    border-radius: 9px;
    color: #fff;
    font-size: 0.98rem;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  .anime-dot {
    width: 6px; height: 6px;
    background: var(--red-glow);
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--red-glow);
  }

  /* Pulse glow on card corners */
  .card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 18px;
    background: transparent;
    border: 1px solid rgba(255,0,10,0.1);
    box-shadow: 0 0 30px rgba(200,0,0,0.15);
    pointer-events: none;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(200,0,0,0.1); }
    50%       { box-shadow: 0 0 40px rgba(255,0,10,0.3); }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="corners"><span></span></div>

<div class="card">
  <div class="avatar-wrap">
    <div class="avatar-ring">
      <div class="avatar-inner">
        <img src="https://i.ibb.co/Y4RqzcpZ/1000111643.jpg" alt="Ghostzin'zk" onerror="this.style.background='#1a0000'">
      </div>
    </div>
  </div>

  <div class="name">GHOST<span>ZIN'ZK</span></div>

  <div class="accordion">

    <!-- MEU NÚMERO -->
    <div class="acc-item" id="item-numero">
      <div class="acc-header" onclick="toggle('item-numero')">
        <div class="acc-icon">📞</div>
        <div class="acc-label">MEU NÚMERO</div>
        <div class="acc-arrow">▶</div>
      </div>
      <div class="acc-body">
        <div class="acc-content">
          <a class="number-link" href="https://wa.me/5545999259081" target="_blank" rel="noopener">
            <span class="number-label">Clique para abrir no WhatsApp</span>
            +55 45 9925-9081
          </a>
        </div>
      </div>
    </div>

    <!-- ARTISTA PREFERIDO -->
    <div class="acc-item" id="item-artista">
      <div class="acc-header" onclick="toggle('item-artista')">
        <div class="acc-icon">🎤</div>
        <div class="acc-label">ARTISTA PREFERIDO</div>
        <div class="acc-arrow">▶</div>
      </div>
      <div class="acc-body">
        <div class="acc-content">
          <div class="artist-name">Marília Mendonça</div>
        </div>
      </div>
    </div>

    <!-- ANIMES -->
    <div class="acc-item" id="item-animes">
      <div class="acc-header" onclick="toggle('item-animes')">
        <div class="acc-icon">⚔️</div>
        <div class="acc-label">ANIMES</div>
        <div class="acc-arrow">▶</div>
      </div>
      <div class="acc-body">
        <div class="acc-content">
          <div class="anime-list">
            <div class="anime-item"><div class="anime-dot"></div>Naruto</div>
            <div class="anime-item"><div class="anime-dot"></div>Black Clover</div>
            <div class="anime-item"><div class="anime-dot"></div>Solo Leveling</div>
            <div class="anime-item"><div class="anime-dot"></div>Hunter x Hunter</div>
            <div class="anime-item"><div class="anime-dot"></div>Jujutsu Kaisen</div>
            <div class="anime-item"><div class="anime-dot"></div>Boruto</div>
            <div class="anime-item"><div class="anime-dot"></div>Nanatsu no Taizai</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  function toggle(id) {
    const item = document.getElementById(id);
    const isOpen = item.classList.contains('open');
    // Close all
    document.querySelectorAll('.acc-item').forEach(el => el.classList.remove('open'));
    // Open clicked if it was closed
    if (!isOpen) item.classList.add('open');
  }
</script>

</body>
</html>
